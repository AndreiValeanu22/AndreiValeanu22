<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 720" width="840" height="720">
  <defs>
    <!-- Background gradient (matching banner) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>

    <!-- Bar fill gradient (blue → cyan → purple) -->
    <linearGradient id="barFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="45%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Title gradient (animated gold shimmer) -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="50%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#f7971e"/>
      <animate attributeName="x1" values="0%;-50%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;150%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Circle stroke gradient -->
    <linearGradient id="circGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7971e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffd200" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f7971e" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="840" height="720" rx="12" fill="url(#bg)"/>
  <rect width="840" height="720" rx="12" fill="none" stroke="#3a7bd5" stroke-width="1" opacity="0.15"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="120" x2="840" y2="120"/>
    <line x1="0" y1="240" x2="840" y2="240"/>
    <line x1="0" y1="360" x2="840" y2="360"/>
    <line x1="0" y1="480" x2="840" y2="480"/>
    <line x1="0" y1="600" x2="840" y2="600"/>
  </g>

  <!-- ==================== TITLE ==================== -->
  <text x="420" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="bold" fill="url(#titleGrad)" filter="url(#glow)">
    Skills &amp; Expertise
  </text>
  <text x="420" y="64" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7a8ba3" letter-spacing="3">
    TECHNICAL PROFICIENCY
  </text>
  <line x1="310" y1="76" x2="530" y2="76" stroke="url(#accentLine)" stroke-width="1" opacity="0.5">
    <animate attributeName="x1" values="400;310" dur="1s" fill="freeze"/>
    <animate attributeName="x2" values="440;530" dur="1s" fill="freeze"/>
  </line>

  <!-- ==================== SKILL 1: C / C++ — 93% ==================== -->
  <text x="40" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    C / C++
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.2s"/>
  </text>
  <text x="800" y="100" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    93%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.2s"/>
  </text>
  <rect x="40" y="110" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="110" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="651" dur="1.3s" fill="freeze" begin="0.3s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="691" cy="117" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="1.3s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="1.3s"/>
  </circle>

  <!-- ==================== SKILL 2: Python & AI/ML — 87% ==================== -->
  <text x="40" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    Python &amp; AI / ML
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.5s"/>
  </text>
  <text x="800" y="155" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    87%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.5s"/>
  </text>
  <rect x="40" y="165" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="165" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="609" dur="1.3s" fill="freeze" begin="0.6s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="649" cy="172" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="1.6s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="1.6s"/>
  </circle>

  <!-- ==================== SKILL 3: Embedded Systems — 83% ==================== -->
  <text x="40" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    Embedded Systems (ARM / FPGA)
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.8s"/>
  </text>
  <text x="800" y="210" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    83%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="0.8s"/>
  </text>
  <rect x="40" y="220" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="220" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="581" dur="1.3s" fill="freeze" begin="0.9s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="621" cy="227" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="1.9s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="1.9s"/>
  </circle>

  <!-- ==================== SKILL 4: x86 Assembly — 80% ==================== -->
  <text x="40" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    x86 Assembly (32-bit &amp; 64-bit)
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.1s"/>
  </text>
  <text x="800" y="265" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    80%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.1s"/>
  </text>
  <rect x="40" y="275" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="275" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="560" dur="1.3s" fill="freeze" begin="1.2s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="600" cy="282" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="2.2s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="2.2s"/>
  </circle>

  <!-- ==================== SKILL 5: CUDA & HPC — 78% ==================== -->
  <text x="40" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    CUDA &amp; Parallel Computing
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.4s"/>
  </text>
  <text x="800" y="320" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    78%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.4s"/>
  </text>
  <rect x="40" y="330" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="330" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="546" dur="1.3s" fill="freeze" begin="1.5s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="586" cy="337" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="2.5s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>

  <!-- ==================== SKILL 6: Java — 76% ==================== -->
  <text x="40" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    Java
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.7s"/>
  </text>
  <text x="800" y="375" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    76%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.7s"/>
  </text>
  <rect x="40" y="385" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="385" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="532" dur="1.3s" fill="freeze" begin="1.8s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="572" cy="392" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="2.8s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="2.8s"/>
  </circle>

  <!-- ==================== SKILL 7: Computer Graphics — 75% ==================== -->
  <text x="40" y="430" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    Computer Graphics (OpenGL)
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.0s"/>
  </text>
  <text x="800" y="430" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    75%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.0s"/>
  </text>
  <rect x="40" y="440" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="440" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="525" dur="1.3s" fill="freeze" begin="2.1s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="565" cy="447" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="3.1s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="3.1s"/>
  </circle>

  <!-- ==================== SKILL 8: Haskell & Racket — 73% ==================== -->
  <text x="40" y="485" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600" opacity="0">
    Haskell &amp; Racket
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.3s"/>
  </text>
  <text x="800" y="485" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffd200" font-weight="bold" opacity="0">
    73%
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="2.3s"/>
  </text>
  <rect x="40" y="495" width="700" height="14" rx="7" fill="#1a1a3e" opacity="0.6"/>
  <rect x="40" y="495" width="0" height="14" rx="7" fill="url(#barFill)" opacity="0.9">
    <animate attributeName="width" from="0" to="511" dur="1.3s" fill="freeze" begin="2.4s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
  </rect>
  <circle cx="551" cy="502" r="5" fill="#ffd200" opacity="0" filter="url(#dotGlow)">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" fill="freeze" begin="3.4s"/>
    <animate attributeName="r" values="4.5;6.5;4.5" dur="2.5s" repeatCount="indefinite" begin="3.4s"/>
  </circle>

  <!-- ==================== SEPARATOR ==================== -->
  <line x1="100" y1="540" x2="740" y2="540" stroke="url(#accentLine)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4" dur="0.5s" fill="freeze" begin="3s"/>
  </line>

  <!-- ==================== LANGUAGES TITLE ==================== -->
  <text x="420" y="570" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#titleGrad)" opacity="0">
    Languages
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.2s"/>
  </text>

  <!-- ==================== LANGUAGE: ROMANIAN — 100% ==================== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.5s"/>

    <!-- Track circle -->
    <circle cx="170" cy="630" r="38" fill="none" stroke="#1a1a3e" stroke-width="7" opacity="0.6"/>
    <!-- Progress circle -->
    <circle cx="170" cy="630" r="38" fill="none" stroke="url(#circGrad)" stroke-width="7"
      stroke-dasharray="238.76" stroke-dashoffset="238.76" stroke-linecap="round"
      transform="rotate(-90, 170, 630)">
      <animate attributeName="stroke-dashoffset" from="238.76" to="0" dur="1.5s" fill="freeze" begin="3.5s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </circle>
    <!-- Percentage -->
    <text x="170" y="635" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">100%</text>
    <!-- Label -->
    <text x="170" y="682" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600">Romanian</text>
    <text x="170" y="698" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7a8ba3">Native</text>
  </g>

  <!-- ==================== LANGUAGE: ENGLISH — 90% (C1) ==================== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.8s"/>

    <circle cx="420" cy="630" r="38" fill="none" stroke="#1a1a3e" stroke-width="7" opacity="0.6"/>
    <circle cx="420" cy="630" r="38" fill="none" stroke="url(#circGrad)" stroke-width="7"
      stroke-dasharray="238.76" stroke-dashoffset="238.76" stroke-linecap="round"
      transform="rotate(-90, 420, 630)">
      <animate attributeName="stroke-dashoffset" from="238.76" to="23.88" dur="1.5s" fill="freeze" begin="3.8s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </circle>
    <text x="420" y="635" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">90%</text>
    <text x="420" y="682" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600">English</text>
    <text x="420" y="698" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7a8ba3">Fluent (C1)</text>
  </g>

  <!-- ==================== LANGUAGE: GERMAN — 70% (B2) ==================== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="4.1s"/>

    <circle cx="670" cy="630" r="38" fill="none" stroke="#1a1a3e" stroke-width="7" opacity="0.6"/>
    <circle cx="670" cy="630" r="38" fill="none" stroke="url(#circGrad)" stroke-width="7"
      stroke-dasharray="238.76" stroke-dashoffset="238.76" stroke-linecap="round"
      transform="rotate(-90, 670, 630)">
      <animate attributeName="stroke-dashoffset" from="238.76" to="71.63" dur="1.5s" fill="freeze" begin="4.1s" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </circle>
    <text x="670" y="635" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">70%</text>
    <text x="670" y="682" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#c8d6e5" font-weight="600">German</text>
    <text x="670" y="698" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7a8ba3">Intermediate (B2)</text>
  </g>

  <!-- ==================== FLOATING PARTICLES ==================== -->
  <g opacity="0.12">
    <circle cx="60" cy="550" r="1.5" fill="#ffd200">
      <animate attributeName="cy" values="550;530;550" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="90" r="2" fill="#00d2ff">
      <animate attributeName="cy" values="90;70;90" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="750" cy="560" r="1.5" fill="#a855f7">
      <animate attributeName="cy" values="560;540;560" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="100" cy="180" r="1" fill="#00d2ff">
      <animate attributeName="cy" values="180;165;180" dur="3.5s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="810" cy="350" r="1.5" fill="#ffd200">
      <animate attributeName="cy" values="350;335;350" dur="4.2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- ==================== BOTTOM TECH BADGES ==================== -->
  <text x="420" y="715" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5a6a7a" letter-spacing="2" opacity="0">
    MATLAB · SQL · CCNA · Arduino · Git · Linux · Verilog · VHDL
    <animate attributeName="opacity" from="0" to="0.5" dur="0.5s" fill="freeze" begin="4.5s"/>
  </text>

</svg>
